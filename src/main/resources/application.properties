# ODONTOLINK - APPLICATION PROPERTIES
# Este archivo contiene la configuracion base de la aplicacion.
# Los valores sensibles se obtienen de variables de entorno.
# Ver .env.example para la lista completa de variables requeridas.

spring.application.name=odontolink

# SERVER CONFIGURATION
server.port=${SERVER_PORT:8080}

# SPRING PROFILES
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# CONFIGURACIÓN DE BASE DE DATOS
# La URL JDBC completa, el usuario y la contraseña se inyectan desde el
# entorno (UI de Dokploy en producción, .env en local). Los valores sensibles
# no tienen default a propósito, así la aplicación falla rápido ante una
# mala configuración en lugar de caer silenciosamente a algo inseguro.
#
# IMPORTANTE: MySQL Connector/J usa sslMode (camelCase), no sslmode. Al
# conectar al servicio MySQL por la red overlay interna de Dokploy, usar
# sslMode=DISABLED — el tráfico nunca sale de la red privada de Docker y
# TLS sólo agrega CPU/latencia sin ganancia real de seguridad.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
# Hibernate 6 selecciona el dialecto a partir del driver: especificarlo a mano
# emite HHH90000025. Se mantiene la conexion bajo MySQL/MariaDB sin acoplar el
# codigo a una version concreta del Dialect.
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Open Session In View desactivado: las consultas LAZY deben resolverse dentro
# de la transaccion del servicio, no durante el render de la vista. Evita N+1
# silenciosos y conexiones abiertas mas alla del limite transaccional.
spring.jpa.open-in-view=false

# JWT CONFIGURATION
# El secreto JWT DEBE ser obtenido de variable de entorno (seguridad critica)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS CONFIGURATION
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# LOGGING CONFIGURATION
logging.level.root=${LOG_LEVEL:INFO}
logging.level.site.utnpf.odontolink=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${SHOW_SQL:false}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${FORMAT_SQL:false}

# ACTUATOR CONFIGURATION (Opcional - para monitoreo en produccion)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# SPRINGDOC/OPENAPI CONFIGURATION
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# BUSINESS RULES CONFIGURATION
# Estrategia de generacion de slots (FIXED: intervalos de 30m, DYNAMIC: duracion real del tratamiento)
odontolink.slot-strategy=${SLOT_GENERATION_STRATEGY:FIXED}

# CHAT MODULE CONFIGURATION
# Tope de mensajes devueltos por GET /api/chat/sessions/{id}/messages cuando se
# llama sin cursor (?since=) ni paginacion (?page=&size=). Devuelve los ultimos
# N en orden cronologico ASC. Para historiales mayores el FE debe pasar a
# paginacion explicita (?page=0&size=50) — el wrapper paginado tambien lleva
# serverTime para arrancar el polling.
odontolink.chat.initial-load-cap=${CHAT_INITIAL_LOAD_CAP:100}

# PASSWORD RESET CONFIGURATION (RF04)
# Ventana de vigencia del token de recuperacion de contrasenia, en minutos.
# El valor por defecto (30) sigue la recomendacion de OWASP para tokens de
# un solo uso entregados por email.
odontolink.password-reset.token-ttl-minutes=${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
# URL base del frontend a la que se anexa el token para construir el enlace
# que ve el usuario en el correo. Solo se usa con fines de visualizacion en
# el adaptador mock que imprime el correo al log.
odontolink.password-reset.frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:3000/reset-password}

# OBJECT STORAGE (S3-compatible)
# Configuracion del proveedor de object storage para subir fotos de perfil
# y otros binarios. Compatible con AWS S3, Cloudflare R2, MinIO, Backblaze B2
# y cualquier otro S3-compliant. Las variables son obligatorias en produccion
# si la funcionalidad de subida de fotos esta habilitada; en dev pueden quedar
# vacias y los endpoints multipart fallaran con StorageException descriptiva.
#
# Ejemplo Cloudflare R2:
#   STORAGE_S3_ENDPOINT=https://<account-id>.r2.cloudflarestorage.com
#   STORAGE_S3_REGION=auto
#   STORAGE_S3_BUCKET=odontolink-uploads
#   STORAGE_S3_PUBLIC_BASE_URL=https://pub-<hash>.r2.dev
#   STORAGE_S3_PATH_STYLE=false
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}
storage.s3.region=${STORAGE_S3_REGION:auto}
storage.s3.bucket=${STORAGE_S3_BUCKET:}
storage.s3.access-key-id=${STORAGE_S3_ACCESS_KEY_ID:}
storage.s3.secret-access-key=${STORAGE_S3_SECRET_ACCESS_KEY:}
storage.s3.public-base-url=${STORAGE_S3_PUBLIC_BASE_URL:}
storage.s3.path-style=${STORAGE_S3_PATH_STYLE:false}

# Limites del subsistema de upload de Spring Boot. El cap a nivel de servlet
# corta payloads exagerados antes de que lleguen al controller; la validacion
# fina (MIME real, tamanio efectivo) ocurre dentro de cada use case.
#
# IMPORTANTE: este cap debe ser >= que el cap mas alto de cualquier endpoint
# multipart de la app, porque Spring rechaza el request ANTES de llegar al
# controller. Hoy el cap mas alto vive en el modulo IA (AI_KB_MAX_UPLOAD_BYTES,
# default 10 MB), por eso el max-file-size se setea a 12 MB con margen para
# overhead multipart (boundaries, headers de cada parte). El cap especifico
# de fotos de perfil (2 MB) se sigue validando dentro de ProfilePictureService.
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=13MB

# PROFILE PICTURE POLICY
# Tamanio maximo del archivo de imagen aceptado por el endpoint dedicado.
# Distinto de spring.servlet.multipart.max-file-size porque queremos un cap
# inferior especifico para fotos (la app puede aceptar otros archivos hasta
# el limite de Spring en otros endpoints futuros).
odontolink.profile-picture.max-bytes=${PROFILE_PICTURE_MAX_BYTES:2097152}
# Lado del cuadrado final tras el crop centrado.
odontolink.profile-picture.target-size-px=${PROFILE_PICTURE_TARGET_SIZE_PX:512}
# Calidad JPEG (0.0-1.0) del archivo normalizado.
odontolink.profile-picture.jpeg-quality=${PROFILE_PICTURE_JPEG_QUALITY:0.85}

# AI AGENT MODULE (RF31/RF32/RF33) - DigitalOcean Gradient Platform
# Endpoint base; en produccion siempre apunta a la API publica de DO.
odontolink.ai-agent.endpoint-base-url=${DIGITALOCEAN_ENDPOINT_BASE_URL:https://api.digitalocean.com}
# Personal Access Token con scope GenAI. Sin default a proposito: fail-fast
# en produccion si esta vacio.
odontolink.ai-agent.access-token=${DIGITALOCEAN_ACCESS_TOKEN:}
# UUID del agente pre-provisto en el dashboard de DO. Provisioning manual:
# el operador lo crea una vez y comparte el UUID por entorno.
odontolink.ai-agent.agent-uuid=${DIGITALOCEAN_AGENT_UUID:}
# UUID de la Knowledge Base pre-provista en el dashboard de DO.
odontolink.ai-agent.knowledge-base-uuid=${DIGITALOCEAN_KNOWLEDGE_BASE_UUID:}
odontolink.ai-agent.connect-timeout-ms=${DO_CONNECT_TIMEOUT_MS:5000}
odontolink.ai-agent.read-timeout-ms=${DO_READ_TIMEOUT_MS:20000}
# Tamanio maximo de archivo subido a la KB (default 10 MB).
odontolink.ai-agent.max-upload-bytes=${AI_KB_MAX_UPLOAD_BYTES:10485760}

# Bucket Spaces dedicado a la Knowledge Base. Separado del bucket de fotos
# de perfil (storage.s3.*) para permitir credenciales, regiones o cuotas
# distintas. IMPORTANTE: debe ser DigitalOcean Spaces o AWS S3 nativo; DO
# Agent Platform no puede indexar desde R2/MinIO/B2 (la API solo expone
# spaces_data_source y aws_data_source, sin endpoint custom).
odontolink.ai-agent.storage.endpoint=${AI_KB_STORAGE_S3_ENDPOINT:}
odontolink.ai-agent.storage.region=${AI_KB_STORAGE_S3_REGION:}
odontolink.ai-agent.storage.bucket=${AI_KB_STORAGE_S3_BUCKET:}
odontolink.ai-agent.storage.access-key-id=${AI_KB_STORAGE_S3_ACCESS_KEY_ID:}
odontolink.ai-agent.storage.secret-access-key=${AI_KB_STORAGE_S3_SECRET_ACCESS_KEY:}
odontolink.ai-agent.storage.public-base-url=${AI_KB_STORAGE_S3_PUBLIC_BASE_URL:}
odontolink.ai-agent.storage.path-style=${AI_KB_STORAGE_S3_PATH_STYLE:false}
odontolink.ai-agent.storage.key-prefix=${AI_KB_STORAGE_KEY_PREFIX:ai-knowledge-base}

# AI CHATBOT INVOCATION (RF29/RF31/RF32/RF34)
# URL de invocacion del agente (chat completions). Cada agente DO deployado
# tiene su propia URL ({id}.agents.do-ai.run). Hibrida: si esta seteada se
# usa; sino se descubre via management API y se cachea en BD en la columna
# agent_invocation_url de ai_agent_configuration.
odontolink.ai-agent.agent-invocation-url=${DIGITALOCEAN_AGENT_INVOCATION_URL:}

# Access key del endpoint del agente (chat completions). DISTINTA del PAT:
# cada agente deployado en DigitalOcean Gradient genera su propia key en la
# seccion "Endpoint Keys" del dashboard, y solo esa key autentica contra
# /api/v1/chat/completions. Si esta vacia, todas las invocaciones del
# chatbot reciben 401 sin body y caen a fallback ("El asistente no esta
# disponible").
odontolink.ai-agent.agent-invocation-access-key=${DIGITALOCEAN_AGENT_ACCESS_KEY:}

# Override opcional del modelo en cada invocacion al agente. Por default
# se omite del body y el agente DO usa el modelo configurado en su dashboard.
# Util para forzar un modelo distinto en tests/staging sin tocar el agente.
odontolink.ai-agent.invocation-model=${DIGITALOCEAN_AGENT_INVOCATION_MODEL:}

# Read timeout especifico del probe del health-check (ms). Mas corto que
# read-timeout-ms (default 20s) para que GET /api/admin/ai-agent/configuration/health
# no cuelgue tanto cuando el agente esta caido. El probe es una invocacion
# minima ("ping"); un agente sano responde en <2s, asi que 5s deja margen.
odontolink.ai-agent.probe-read-timeout-ms=${DO_PROBE_READ_TIMEOUT_MS:5000}

# Resiliencia para invocacion del agente (Resilience4j). El circuit breaker
# se abre si >50% de las ultimas 10 calls fallan, esperando 30s antes de
# probar. Si el proveedor responde lento (>10s) las calls cuentan como
# fallas para abrir el circuito y devolver fallback amigable en lugar de
# bloquear el request. Retries solo aplican a excepciones de red transitorias.
resilience4j.circuitbreaker.instances.doAgentInvoke.sliding-window-size=10
resilience4j.circuitbreaker.instances.doAgentInvoke.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.doAgentInvoke.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.doAgentInvoke.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.doAgentInvoke.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.doAgentInvoke.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.doAgentInvoke.minimum-number-of-calls=5
resilience4j.retry.instances.doAgentInvoke.max-attempts=2
resilience4j.retry.instances.doAgentInvoke.wait-duration=500ms
resilience4j.retry.instances.doAgentInvoke.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.net.SocketTimeoutException

# INITIAL ADMINISTRATOR BOOTSTRAP
# Si las tres variables obligatorias (email, password, dni) estan presentes,
# InitialAdminBootstrapper crea el primer administrador al arrancar la app.
# Es idempotente: si el admin ya existe, no hace nada.
# Para desactivar, basta con borrar las variables en la UI de Dokploy.
odontolink.initial-admin.email=${INITIAL_ADMIN_EMAIL:}
odontolink.initial-admin.password=${INITIAL_ADMIN_PASSWORD:}
odontolink.initial-admin.dni=${INITIAL_ADMIN_DNI:}
odontolink.initial-admin.first-name=${INITIAL_ADMIN_FIRST_NAME:}
odontolink.initial-admin.last-name=${INITIAL_ADMIN_LAST_NAME:}
odontolink.initial-admin.phone=${INITIAL_ADMIN_PHONE:}
odontolink.initial-admin.birth-date=${INITIAL_ADMIN_BIRTH_DATE:}
